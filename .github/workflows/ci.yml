name: CI Pipeline de Testes

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  testes:
    name: Testes no ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Aqui matamos o requisito dos 3 sistemas operacionais
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Rodar os testes e gerar relatório de cobertura
      run: |
        pytest --cov=src --cov-report=xml

    - name: Upload da Cobertura para o Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml